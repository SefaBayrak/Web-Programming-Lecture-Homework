<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axios React CRUD</title>
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 5px; border: 1px solid #ccc; }
        h1 { text-align: center; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; background-color: #2c3e50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #1a252f; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        table, th, td { border: 1px solid #ccc; }
        th, td { padding: 10px; text-align: left; }
        th { background-color: #ecf0f1; }
        .action-btn { padding: 5px 10px; margin-right: 5px; font-size: 14px; }
        .edit-btn { background-color: #f39c12; }
        .edit-btn:hover { background-color: #e67e22; }
        .delete-btn { background-color: #e74c3c; }
        .delete-btn:hover { background-color: #c0392b; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2c3e50; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        .status-msg { text-align: center; font-style: italic; margin-top: 10px; font-weight: bold; }
        .error { color: #e74c3c; }
        .success { color: #27ae60; }
        .loading { text-align: center; padding: 20px; color: #7f8c8d; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-link">Back to Home</a>
        <div id="root"></div>
    </div>

    <script type="text/babel">
        function App() {
            const API_URL = 'server.php';
            
            const [animals, setAnimals] = React.useState([]);
            const [formData, setFormData] = React.useState({ id: null, aname: '', species: '' });
            const [isEditing, setIsEditing] = React.useState(false);
            const [status, setStatus] = React.useState({ text: '', type: '' });
            const [isLoading, setIsLoading] = React.useState(true);

            // Fetch data on component mount
            React.useEffect(() => {
                fetchAnimals();
            }, []);

            const fetchAnimals = () => {
                setIsLoading(true);
                axios.get(API_URL)
                    .then(response => {
                        if (response.data.error) {
                            showStatus(response.data.error, 'error');
                            setAnimals([]);
                        } else {
                            // Ensure data is array (could be empty if no records)
                            setAnimals(Array.isArray(response.data) ? response.data : []);
                            setStatus({ text: '', type: '' });
                        }
                    })
                    .catch(error => {
                        console.error("Error fetching data:", error);
                        showStatus("Failed to load data. Is server.php configured correctly?", 'error');
                    })
                    .finally(() => {
                        setIsLoading(false);
                    });
            };

            const showStatus = (text, type) => {
                setStatus({ text, type });
                setTimeout(() => setStatus({ text: '', type: '' }), 4000);
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData({ ...formData, [name]: value });
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.aname || !formData.species) {
                    showStatus("Please fill in both fields.", 'error');
                    return;
                }

                if (isEditing) {
                    // Update
                    axios.put(API_URL, formData)
                        .then(response => {
                            if (response.data.error) throw new Error(response.data.error);
                            fetchAnimals();
                            showStatus("Updated successfully!", 'success');
                            setFormData({ id: null, aname: '', species: '' });
                            setIsEditing(false);
                        })
                        .catch(error => showStatus(error.message || "Failed to update", 'error'));
                } else {
                    // Create
                    axios.post(API_URL, { aname: formData.aname, species: formData.species })
                        .then(response => {
                            if (response.data.error) throw new Error(response.data.error);
                            fetchAnimals();
                            showStatus("Added successfully!", 'success');
                            setFormData({ id: null, aname: '', species: '' });
                        })
                        .catch(error => showStatus(error.message || "Failed to add", 'error'));
                }
            };

            const handleEdit = (animal) => {
                setFormData(animal);
                setIsEditing(true);
            };

            const handleDelete = (id) => {
                if (window.confirm("Are you sure you want to delete this animal from the database?")) {
                    axios.delete(API_URL, { data: { id: id } })
                        .then(response => {
                            if (response.data.error) throw new Error(response.data.error);
                            fetchAnimals();
                            showStatus("Deleted successfully!", 'success');
                            if (formData.id === id) {
                                setFormData({ id: null, aname: '', species: '' });
                                setIsEditing(false);
                            }
                        })
                        .catch(error => showStatus(error.message || "Failed to delete", 'error'));
                }
            };

            return (
                <div>
                    <h1 style={{textAlign: "center", color: "#2c3e50"}}>React Axios CRUD (Server-Side)</h1>
                    <p style={{textAlign: "center"}}>This application connects to <strong>server.php</strong> using the Axios library in React.</p>
                    
                    <form onSubmit={handleSubmit}>
                        <div className="form-group">
                            <label>Animal Name:</label>
                            <input 
                                type="text" 
                                name="aname" 
                                value={formData.aname} 
                                onChange={handleInputChange} 
                                placeholder="Enter animal name" 
                            />
                        </div>
                        <div className="form-group">
                            <label>Species:</label>
                            <input 
                                type="text" 
                                name="species" 
                                value={formData.species} 
                                onChange={handleInputChange} 
                                placeholder="Enter species" 
                            />
                        </div>
                        <button type="submit">
                            {isEditing ? "Update Animal" : "Add Animal"}
                        </button>
                    </form>

                    {status.text && (
                        <div className={`status-msg ${status.type}`}>
                            {status.text}
                        </div>
                    )}

                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Species</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            {isLoading ? (
                                <tr>
                                    <td colSpan="4" className="loading">Loading data from server...</td>
                                </tr>
                            ) : animals.length === 0 ? (
                                <tr>
                                    <td colSpan="4" style={{ textAlign: 'center' }}>No animals found in database.</td>
                                </tr>
                            ) : (
                                animals.map((animal) => (
                                    <tr key={animal.id}>
                                        <td>{animal.id}</td>
                                        <td>{animal.aname}</td>
                                        <td>{animal.species}</td>
                                        <td>
                                            <button className="action-btn edit-btn" onClick={() => handleEdit(animal)}>Edit</button>
                                            <button className="action-btn delete-btn" onClick={() => handleDelete(animal.id)}>Delete</button>
                                        </td>
                                    </tr>
                                ))
                            )}
                        </tbody>
                    </table>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
