<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch API CRUD</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 5px; border: 1px solid #ccc; }
        h1 { text-align: center; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; background-color: #2c3e50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #1a252f; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        table, th, td { border: 1px solid #ccc; }
        th, td { padding: 10px; text-align: left; }
        th { background-color: #ecf0f1; }
        .action-btn { padding: 5px 10px; margin-right: 5px; font-size: 14px; }
        .edit-btn { background-color: #f39c12; }
        .edit-btn:hover { background-color: #e67e22; }
        .delete-btn { background-color: #e74c3c; }
        .delete-btn:hover { background-color: #c0392b; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2c3e50; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        .loading { text-align: center; font-style: italic; color: #7f8c8d; margin-top: 20px; }
        .error-msg { color: #e74c3c; font-weight: bold; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">Back to Home</a>
    <h1>Fetch API CRUD (Server-Side)</h1>
    <p style="text-align:center;">This application connects to <strong>server.php</strong> using the native Fetch API.</p>

    <div class="form-group">
        <input type="hidden" id="animalId">
        <label for="animalName">Animal Name:</label>
        <input type="text" id="animalName" placeholder="Enter animal name">
    </div>
    <div class="form-group">
        <label for="animalSpecies">Species:</label>
        <input type="text" id="animalSpecies" placeholder="Enter species">
    </div>
    <button id="saveBtn" onclick="saveAnimal()">Add Animal</button>
    <div id="statusMessage" class="error-msg"></div>

    <table id="animalTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Species</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="4" class="loading">Loading data from server...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const API_URL = 'server.php';
    let editingId = null;

    function fetchAnimals() {
        document.getElementById('statusMessage').textContent = '';
        fetch(API_URL)
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    throw new Error(data.error);
                }
                renderTable(data);
            })
            .catch(error => {
                console.error('Error fetching data:', error);
                document.getElementById('tableBody').innerHTML = `<tr><td colspan="4" class="error-msg">Failed to load data. Is the database connected?</td></tr>`;
                document.getElementById('statusMessage').textContent = 'Database Connection Error. Check server.php settings.';
            });
    }

    function renderTable(animals) {
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";

        if (animals.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;">No animals found in the database.</td></tr>`;
            return;
        }

        animals.forEach(animal => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${animal.id}</td>
                <td>${animal.aname}</td>
                <td>${animal.species}</td>
                <td>
                    <button class="action-btn edit-btn" onclick="editAnimal(${animal.id}, '${animal.aname.replace(/'/g, "\\'")}', '${animal.species.replace(/'/g, "\\'")}')">Edit</button>
                    <button class="action-btn delete-btn" onclick="deleteAnimal(${animal.id})">Delete</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function saveAnimal() {
        const nameInput = document.getElementById("animalName").value.trim();
        const speciesInput = document.getElementById("animalSpecies").value.trim();
        const statusEl = document.getElementById("statusMessage");

        if (!nameInput || !speciesInput) {
            statusEl.textContent = "Please fill in both fields.";
            return;
        }

        statusEl.textContent = "Saving...";

        const payload = { aname: nameInput, species: speciesInput };
        let method = 'POST';

        if (editingId) {
            method = 'PUT';
            payload.id = editingId;
        }

        fetch(API_URL, {
            method: method,
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            if (data.error) {
                throw new Error(data.error);
            }
            clearForm();
            fetchAnimals(); // Reload data
            statusEl.textContent = "Saved successfully!";
            setTimeout(() => statusEl.textContent = '', 3000);
        })
        .catch(error => {
            console.error('Error saving data:', error);
            statusEl.textContent = 'Failed to save data. ' + error.message;
        });
    }

    function editAnimal(id, name, species) {
        document.getElementById("animalId").value = id;
        document.getElementById("animalName").value = name;
        document.getElementById("animalSpecies").value = species;
        editingId = id;
        document.getElementById("saveBtn").textContent = "Update Animal";
        document.getElementById("statusMessage").textContent = "";
    }

    function deleteAnimal(id) {
        if (confirm("Are you sure you want to delete this animal from the database?")) {
            const statusEl = document.getElementById("statusMessage");
            statusEl.textContent = "Deleting...";

            fetch(API_URL, {
                method: 'DELETE',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ id: id })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) throw new Error(data.error);
                if (editingId === id) {
                    clearForm();
                }
                fetchAnimals(); // Reload data
                statusEl.textContent = "Deleted successfully!";
                setTimeout(() => statusEl.textContent = '', 3000);
            })
            .catch(error => {
                console.error('Error deleting data:', error);
                statusEl.textContent = 'Failed to delete data. ' + error.message;
            });
        }
    }

    function clearForm() {
        document.getElementById("animalId").value = "";
        document.getElementById("animalName").value = "";
        document.getElementById("animalSpecies").value = "";
        editingId = null;
        document.getElementById("saveBtn").textContent = "Add Animal";
    }

    // Load initial data
    fetchAnimals();
</script>

</body>
</html>
