<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript CRUD</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 15px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #1a252f;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table, th, td {
            border: 1px solid #ccc;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #ecf0f1;
        }
        .action-btn {
            padding: 5px 10px;
            margin-right: 5px;
            font-size: 14px;
        }
        .edit-btn { background-color: #f39c12; }
        .edit-btn:hover { background-color: #e67e22; }
        .delete-btn { background-color: #e74c3c; }
        .delete-btn:hover { background-color: #c0392b; }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #2c3e50;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">Back to Home</a>
    <h1>JavaScript CRUD - Animal Names</h1>
    
    <div class="form-group">
        <input type="hidden" id="animalId">
        <label for="animalName">Animal Name:</label>
        <input type="text" id="animalName" placeholder="Enter animal name">
    </div>
    <div class="form-group">
        <label for="animalSpecies">Species:</label>
        <input type="text" id="animalSpecies" placeholder="Enter species">
    </div>
    <button id="saveBtn" onclick="saveAnimal()">Add Animal</button>

    <table id="animalTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Species</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <!-- Data will be populated here -->
        </tbody>
    </table>
</div>

<script>
    // Initial data from the database file
    let animals = [
        { id: 1, aname: "Lajos", species: "donkey" },
        { id: 2, aname: "Csuri", species: "sparrow" },
        { id: 3, aname: "Böske", species: "horse" },
        { id: 4, aname: "Bark", species: "fox" },
        { id: 5, aname: "Csámpás", species: "donkey" }
    ];

    let currentId = 6;
    let editingId = null;

    function renderTable() {
        const tbody = document.querySelector("#animalTable tbody");
        tbody.innerHTML = "";

        animals.forEach(animal => {
            const tr = document.createElement("tr");
            
            tr.innerHTML = `
                <td>${animal.id}</td>
                <td>${animal.aname}</td>
                <td>${animal.species}</td>
                <td>
                    <button class="action-btn edit-btn" onclick="editAnimal(${animal.id})">Edit</button>
                    <button class="action-btn delete-btn" onclick="deleteAnimal(${animal.id})">Delete</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function saveAnimal() {
        const nameInput = document.getElementById("animalName").value.trim();
        const speciesInput = document.getElementById("animalSpecies").value.trim();

        if (!nameInput || !speciesInput) {
            alert("Please fill in both fields.");
            return;
        }

        if (editingId) {
            // Update
            const index = animals.findIndex(a => a.id === editingId);
            if (index !== -1) {
                animals[index].aname = nameInput;
                animals[index].species = speciesInput;
            }
            editingId = null;
            document.getElementById("saveBtn").textContent = "Add Animal";
        } else {
            // Create
            animals.push({
                id: currentId++,
                aname: nameInput,
                species: speciesInput
            });
        }

        clearForm();
        renderTable();
    }

    function editAnimal(id) {
        const animal = animals.find(a => a.id === id);
        if (animal) {
            document.getElementById("animalId").value = animal.id;
            document.getElementById("animalName").value = animal.aname;
            document.getElementById("animalSpecies").value = animal.species;
            editingId = animal.id;
            document.getElementById("saveBtn").textContent = "Update Animal";
        }
    }

    function deleteAnimal(id) {
        if (confirm("Are you sure you want to delete this animal?")) {
            animals = animals.filter(a => a.id !== id);
            if (editingId === id) {
                clearForm();
                editingId = null;
                document.getElementById("saveBtn").textContent = "Add Animal";
            }
            renderTable();
        }
    }

    function clearForm() {
        document.getElementById("animalId").value = "";
        document.getElementById("animalName").value = "";
        document.getElementById("animalSpecies").value = "";
    }

    // Initial render
    renderTable();
</script>

</body>
</html>
