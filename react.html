<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React CRUD</title>
    <!-- React via CDN (Babel/standalone) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 15px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #1a252f;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table, th, td {
            border: 1px solid #ccc;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #ecf0f1;
        }
        .action-btn {
            padding: 5px 10px;
            margin-right: 5px;
            font-size: 14px;
        }
        .edit-btn { background-color: #f39c12; }
        .edit-btn:hover { background-color: #e67e22; }
        .delete-btn { background-color: #e74c3c; }
        .delete-btn:hover { background-color: #c0392b; }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #2c3e50;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-link">Back to Home</a>
        <div id="root"></div>
    </div>

    <script type="text/babel">
        function App() {
            // Initial data
            const initialData = [
                { id: 1, aname: "Lajos", species: "donkey" },
                { id: 2, aname: "Csuri", species: "sparrow" },
                { id: 3, aname: "Böske", species: "horse" },
                { id: 4, aname: "Bark", species: "fox" },
                { id: 5, aname: "Csámpás", species: "donkey" }
            ];

            const [animals, setAnimals] = React.useState(initialData);
            const [formData, setFormData] = React.useState({ id: null, aname: '', species: '' });
            const [isEditing, setIsEditing] = React.useState(false);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData({ ...formData, [name]: value });
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.aname || !formData.species) {
                    alert("Please fill in both fields.");
                    return;
                }

                if (isEditing) {
                    setAnimals(animals.map(animal => 
                        animal.id === formData.id ? { ...animal, aname: formData.aname, species: formData.species } : animal
                    ));
                    setIsEditing(false);
                } else {
                    const newId = animals.length > 0 ? Math.max(...animals.map(a => a.id)) + 1 : 1;
                    setAnimals([...animals, { id: newId, aname: formData.aname, species: formData.species }]);
                }
                
                setFormData({ id: null, aname: '', species: '' });
            };

            const handleEdit = (animal) => {
                setFormData(animal);
                setIsEditing(true);
            };

            const handleDelete = (id) => {
                if (window.confirm("Are you sure you want to delete this animal?")) {
                    setAnimals(animals.filter(animal => animal.id !== id));
                    if (formData.id === id) {
                        setFormData({ id: null, aname: '', species: '' });
                        setIsEditing(false);
                    }
                }
            };

            return (
                <div>
                    <h1>React CRUD - Animal Names</h1>
                    <form onSubmit={handleSubmit}>
                        <div className="form-group">
                            <label>Animal Name:</label>
                            <input 
                                type="text" 
                                name="aname" 
                                value={formData.aname} 
                                onChange={handleInputChange} 
                                placeholder="Enter animal name" 
                            />
                        </div>
                        <div className="form-group">
                            <label>Species:</label>
                            <input 
                                type="text" 
                                name="species" 
                                value={formData.species} 
                                onChange={handleInputChange} 
                                placeholder="Enter species" 
                            />
                        </div>
                        <button type="submit">
                            {isEditing ? "Update Animal" : "Add Animal"}
                        </button>
                    </form>

                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Species</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            {animals.map((animal) => (
                                <tr key={animal.id}>
                                    <td>{animal.id}</td>
                                    <td>{animal.aname}</td>
                                    <td>{animal.species}</td>
                                    <td>
                                        <button className="action-btn edit-btn" onClick={() => handleEdit(animal)}>Edit</button>
                                        <button className="action-btn delete-btn" onClick={() => handleDelete(animal.id)}>Delete</button>
                                    </td>
                                </tr>
                            ))}
                            {animals.length === 0 && (
                                <tr>
                                    <td colSpan="4" style={{ textAlign: 'center' }}>No animals found.</td>
                                </tr>
                            )}
                        </tbody>
                    </table>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
