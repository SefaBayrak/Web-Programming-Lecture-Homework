<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPA - React Applications</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 5px; border: 1px solid #ccc; text-align: center; }
        h1 { color: #2c3e50; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2c3e50; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        
        .nav-menu { margin-bottom: 30px; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }
        .nav-btn { padding: 10px 20px; margin: 0 10px; background-color: transparent; color: #2c3e50; border: 2px solid #2c3e50; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .nav-btn:hover { background-color: #ecf0f1; }
        .nav-btn.active { background-color: #2c3e50; color: white; }

        /* Tic-Tac-Toe */
        .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; justify-content: center; margin: 20px auto; }
        .square { width: 100px; height: 100px; background: white; border: 2px solid #34495e; font-size: 48px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #2c3e50; }
        .square:hover { background: #ecf0f1; }
        .status { font-size: 20px; margin-bottom: 15px; font-weight: bold; }
        .reset-btn { padding: 10px 20px; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .reset-btn:hover { background: #c0392b; }

        /* Calculator */
        .calc { width: 300px; margin: 0 auto; background: #34495e; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .display { background: #ecf0f1; padding: 15px; font-size: 28px; text-align: right; margin-bottom: 15px; border-radius: 5px; height: 35px; overflow: hidden; color: #2c3e50; }
        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .calc-btn { padding: 15px 0; font-size: 20px; border: none; border-radius: 5px; background: #ecf0f1; cursor: pointer; color: #2c3e50; font-weight: bold; }
        .calc-btn:hover { background: #bdc3c7; }
        .calc-btn.op { background: #f39c12; color: white; }
        .calc-btn.op:hover { background: #e67e22; }
        .calc-btn.zero { grid-column: span 2; }
        .calc-btn.clear { background: #e74c3c; color: white; grid-column: span 2; }
        .calc-btn.clear:hover { background: #c0392b; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">Back to Home</a>
        <div id="root"></div>
    </div>

    <script type="text/babel">
        // Tic-Tac-Toe Component
        function TicTacToe() {
            const [board, setBoard] = React.useState(Array(9).fill(null));
            const [isXNext, setIsXNext] = React.useState(true);

            const checkWinner = (squares) => {
                const lines = [
                    [0, 1, 2], [3, 4, 5], [6, 7, 8],
                    [0, 3, 6], [1, 4, 7], [2, 5, 8],
                    [0, 4, 8], [2, 4, 6]
                ];
                for (let i = 0; i < lines.length; i++) {
                    const [a, b, c] = lines[i];
                    if (squares[a] && squares[a] === squares[b] && squares[a] === squares[c]) {
                        return squares[a];
                    }
                }
                return null;
            };

            const winner = checkWinner(board);
            const isDraw = !winner && board.every(square => square !== null);

            const handleClick = (index) => {
                if (board[index] || winner) return;
                const newBoard = [...board];
                newBoard[index] = isXNext ? 'X' : 'O';
                setBoard(newBoard);
                setIsXNext(!isXNext);
            };

            const resetGame = () => {
                setBoard(Array(9).fill(null));
                setIsXNext(true);
            };

            return (
                <div>
                    <h2>Tic-Tac-Toe Game</h2>
                    <div className="status">
                        {winner ? `Winner: ${winner}` : isDraw ? "Draw!" : `Next player: ${isXNext ? 'X' : 'O'}`}
                    </div>
                    <div className="board">
                        {board.map((square, i) => (
                            <div key={i} className="square" onClick={() => handleClick(i)}>
                                {square}
                            </div>
                        ))}
                    </div>
                    <button className="reset-btn" onClick={resetGame}>Restart Game</button>
                </div>
            );
        }

        // Calculator Component
        function Calculator() {
            const [display, setDisplay] = React.useState('0');
            const [previousValue, setPreviousValue] = React.useState(null);
            const [operator, setOperator] = React.useState(null);
            const [waitingForNewValue, setWaitingForNewValue] = React.useState(false);

            const handleDigit = (digit) => {
                if (waitingForNewValue) {
                    setDisplay(String(digit));
                    setWaitingForNewValue(false);
                } else {
                    setDisplay(display === '0' ? String(digit) : display + digit);
                }
            };

            const handleOperator = (nextOperator) => {
                const inputValue = parseFloat(display);
                
                if (previousValue == null) {
                    setPreviousValue(inputValue);
                } else if (operator) {
                    const currentValue = previousValue || 0;
                    let newValue = 0;
                    if (operator === '+') newValue = currentValue + inputValue;
                    else if (operator === '-') newValue = currentValue - inputValue;
                    else if (operator === '*') newValue = currentValue * inputValue;
                    else if (operator === '/') newValue = currentValue / inputValue;
                    
                    setPreviousValue(newValue);
                    setDisplay(String(newValue));
                }
                
                setWaitingForNewValue(true);
                setOperator(nextOperator);
            };

            const handleEqual = () => {
                if (!operator || previousValue == null) return;
                handleOperator(operator);
                setOperator(null);
                setPreviousValue(null);
                setWaitingForNewValue(true);
            };

            const handleClear = () => {
                setDisplay('0');
                setPreviousValue(null);
                setOperator(null);
                setWaitingForNewValue(false);
            };

            return (
                <div>
                    <h2>React Calculator</h2>
                    <div className="calc">
                        <div className="display">{display}</div>
                        <div className="keypad">
                            <button className="calc-btn clear" onClick={handleClear}>C</button>
                            <button className="calc-btn op" onClick={() => handleOperator('/')}>/</button>
                            <button className="calc-btn op" onClick={() => handleOperator('*')}>*</button>
                            
                            <button className="calc-btn" onClick={() => handleDigit(7)}>7</button>
                            <button className="calc-btn" onClick={() => handleDigit(8)}>8</button>
                            <button className="calc-btn" onClick={() => handleDigit(9)}>9</button>
                            <button className="calc-btn op" onClick={() => handleOperator('-')}>-</button>
                            
                            <button className="calc-btn" onClick={() => handleDigit(4)}>4</button>
                            <button className="calc-btn" onClick={() => handleDigit(5)}>5</button>
                            <button className="calc-btn" onClick={() => handleDigit(6)}>6</button>
                            <button className="calc-btn op" onClick={() => handleOperator('+')}>+</button>
                            
                            <button className="calc-btn" onClick={() => handleDigit(1)}>1</button>
                            <button className="calc-btn" onClick={() => handleDigit(2)}>2</button>
                            <button className="calc-btn" onClick={() => handleDigit(3)}>3</button>
                            <button className="calc-btn op" style={{gridRow: 'span 2'}} onClick={handleEqual}>=</button>
                            
                            <button className="calc-btn zero" onClick={() => handleDigit(0)}>0</button>
                            <button className="calc-btn" onClick={() => handleDigit('.')}>.</button>
                        </div>
                    </div>
                </div>
            );
        }

        // Main App Component
        function App() {
            const [currentApp, setCurrentApp] = React.useState('tictactoe');

            return (
                <div>
                    <h1>Single Page Application (SPA)</h1>
                    <div className="nav-menu">
                        <button 
                            className={`nav-btn ${currentApp === 'tictactoe' ? 'active' : ''}`}
                            onClick={() => setCurrentApp('tictactoe')}
                        >
                            Tic-Tac-Toe
                        </button>
                        <button 
                            className={`nav-btn ${currentApp === 'calc' ? 'active' : ''}`}
                            onClick={() => setCurrentApp('calc')}
                        >
                            Calculator
                        </button>
                    </div>
                    
                    <div className="app-content">
                        {currentApp === 'tictactoe' ? <TicTacToe /> : <Calculator />}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
